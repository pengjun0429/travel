        // ============================================================
        //  UTILS
        // ============================================================
        function decodeJwt(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                return JSON.parse(jsonPayload);
            } catch (e) { return null; }
        }

        function generateUid(email) {
            let hash = 0;
            for (let i = 0; i < email.length; i++) {
                const chr = email.charCodeAt(i);
                hash = ((hash << 5) - hash) + chr;
                hash |= 0;
            }
            return 'u' + Math.abs(hash).toString(36);
        }

        function switchLang(lang) {
            document.cookie = 'tw_lang=' + lang + ';path=/;max-age=31536000';
            const pages = { zh: '/', en: '/en', jp: '/jp', ko: '/ko' };
            window.location.replace(pages[lang] || '/');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.remove('opacity-0', 'translate-y-10', 'pointer-events-none');
            toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'translate-y-10', 'pointer-events-none');
            }, 3000);
        }

            const email = payload.email.trim().toLowerCase();
            const uid = generateUid(email);

            currentUser = {

                name: payload.name,
                picture: payload.picture,
                uid: uid
            };

            isLoggedIn = true;

        // ============================================================

        // ============================================================
        async function fetchFromCloud(action, data = null) {
            if (!API_BASE || API_BASE.includes("YOUR-SUBDOMAIN")) return null;
            try {
                const fetchWithTimeout = (url, options = {}) => {
                    return Promise.race([
                        fetch(url, options),
                        new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 10000))
                    ]);
                };
                if (action === "getTrip") {
                    const params = data.tripId ? `trip_id=${encodeURIComponent(data.tripId)}` : `uid=${encodeURIComponent(data.uid)}`;
                    const res = await fetchWithTimeout(`${API_BASE}/api/trip?${params}`);
                    const json = await res.json();
                    if (json.empty) return null;
                    return json;
                }
                if (action === "save") {
                    const res = await fetchWithTimeout(`${API_BASE}/api/trip`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(data)
                    });
                    return await res.json();
                }
                return null;
            } catch (err) {
                console.error("?�라?��? ?�결 ?�패:", err);
                return null;
            }
        }

            if (isGuestMode) {

            // Fetch trip data by trip_id or uid
            let cloudConfig = null;
            if (currentTripId) {

            } else if (currentUser) {
                cloudConfig = await fetchFromCloud("getTrip", { uid: currentUser.uid });
            }

            if (cloudConfig) {
                globalConfig.tripTitle = cloudConfig.tripTitle || globalConfig.tripTitle;
                globalConfig.tripDate = cloudConfig.tripDate || globalConfig.tripDate;
                ownerEmail = cloudConfig.ownerEmail || '';
                collaborators = cloudConfig.collaborators || [];
                currentTripId = cloudConfig.tripId || currentTripId;
                if (cloudConfig.itineraryData && cloudConfig.itineraryData.length > 0) {
                    itineraryData = cloudConfig.itineraryData;
                }
                if (!ownerEmail && currentUser) {
                    ownerEmail = currentUser.email;
                }
            }

            // Per-user local data fallback
            if (itineraryData.length === 0 && currentTripId) {
                const saved = localStorage.getItem('tw_trip_' + currentTripId);
                if (saved) {
                    try { itineraryData = JSON.parse(saved); } catch(e) {}
                }
            }

            if (itineraryData.length === 0) {
                itineraryData = getFallbackDefaultData();
                if (currentUser && !ownerEmail) ownerEmail = currentUser.email;

            updateHeaderUI();

            document.getElementById('modal-day-info').classList.remove('hidden');
        }

        async function saveDayInfo() {
            const day = itineraryData[currentDayIndex];
            day.date = document.getElementById('input-date').value;
            day.hotel = document.getElementById('input-hotel').value;
            day.food = document.getElementById('input-food').value;
            day.notes = document.getElementById('input-notes').value;
            selectDay(currentDayIndex);
            closeModal('modal-day-info');
            await syncToCloud();
        }

        function openActivityModal(isEdit = false, idx = -1) {
            closeFab();
            if(!canEdit()) return showToast("로그?�이 ?��??��???);
            editingActIndex = idx;
            document.getElementById('modal-activity-title').textContent = isEdit ? '?��? ?��?' : '?��? 추�?';
            if (isEdit && idx >= 0) {
                const act = itineraryData[currentDayIndex].activities[idx];
                document.getElementById('act-time').value = act.time;
                document.getElementById('act-icon').value = act.icon;
                document.getElementById('act-title').value = act.title;
                document.getElementById('act-desc').value = act.desc;
            } else {
                document.getElementById('act-time').value = '09:00';
                document.getElementById('act-icon').value = 'fa-location-dot';
                document.getElementById('act-title').value = '';
                document.getElementById('act-desc').value = '';
            }
            document.getElementById('modal-activity').classList.remove('hidden');
        }

        function editActivity(idx) { openActivityModal(true, idx); }

        async function deleteActivity(idx) {
            if(!canEdit()) return;
            if(confirm('???��????��??��???')) {
                itineraryData[currentDayIndex].activities.splice(idx, 1);
                renderActivities(itineraryData[currentDayIndex].activities);
                await syncToCloud();
            }
        }

        async function saveActivity() {
            const time = document.getElementById('act-time').value;
            const icon = document.getElementById('act-icon').value;
            const title = document.getElementById('act-title').value.trim();
            const desc = document.getElementById('act-desc').value.trim();
            if(!title) return showToast("?�목???�력?�세??);
            const newAct = { id: Date.now().toString(), time, icon, title, desc };
            if (!itineraryData[currentDayIndex].activities) itineraryData[currentDayIndex].activities = [];
            if (editingActIndex >= 0) itineraryData[currentDayIndex].activities[editingActIndex] = newAct;
            else itineraryData[currentDayIndex].activities.push(newAct);
            itineraryData[currentDayIndex].activities.sort((a, b) => a.time.localeCompare(b.time));
            renderActivities(itineraryData[currentDayIndex].activities);
            closeModal('modal-activity');
            await syncToCloud();
        }

        function addNewDay() {
            closeFab();
            if (!canEdit()) return showToast("로그?�이 ?��??��???);
            const lastDay = itineraryData[itineraryData.length - 1];
            let nextDate = new Date();
            if (lastDay && lastDay.date) {
                nextDate = new Date(lastDay.date);
                nextDate.setDate(nextDate.getDate() + 1);
            }
            const newDay = {
                id: 'd' + (itineraryData.length + 1),
                date: nextDate.toISOString().slice(0, 10),
                title: 'Day ' + (itineraryData.length + 1),
                hotel: '',
                food: '',
                notes: '',
                activities: []
            };
            itineraryData.push(newDay);
            renderTimeline();
            selectDay(itineraryData.length - 1);
            syncToCloud();
            showToast('추�???Day ' + itineraryData.length);
        }

        async function deleteCurrentDay() {
            if (!canEdit()) return;
            if (itineraryData.length <= 1) return showToast("최�? 1?��? ?�겨???��???);
            if (!confirm('?��??��???Day ' + (currentDayIndex + 1) + '？이 ?��??� ?��?�????�습?�다.')) return;
            itineraryData.splice(currentDayIndex, 1);
            if (currentDayIndex >= itineraryData.length) currentDayIndex = itineraryData.length - 1;
            renderTimeline();
            selectDay(currentDayIndex);
            syncToCloud();
            showToast('?��???);
        }

        let fabOpen = false;
        function toggleFab() {
            fabOpen = !fabOpen;
            const menu = document.querySelector('.fab-menu');
            const icon = document.getElementById('fab-icon');
            if (fabOpen) {
                menu.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
                menu.classList.add('opacity-100', 'translate-y-0');
                icon.style.transform = 'rotate(45deg)';
            } else {
                closeFab();
            }
        }
        function closeFab() {
            fabOpen = false;
            const menu = document.querySelector('.fab-menu');
            const icon = document.getElementById('fab-icon');
            if (menu) {
                menu.classList.add('opacity-0', 'translate-y-4', 'pointer-events-none');
                menu.classList.remove('opacity-100', 'translate-y-0');
            }
            if (icon) icon.style.transform = 'rotate(0deg)';
        }
        function openFab() {
            fabOpen = true;
            const menu = document.querySelector('.fab-menu');
            const icon = document.getElementById('fab-icon');
            if (menu) {
                menu.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
                menu.classList.add('opacity-100', 'translate-y-0');
            }
            if (icon) icon.style.transform = 'rotate(45deg)';
        }

        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        function showMapPreview(act) {
            const panel = document.getElementById('map-panel');
            const content = document.getElementById('preview-content');
            panel.classList.remove('hidden');
            panel.classList.add('flex');
            const searchKeyword = encodeURIComponent(act.title);
            const googleMapUrl = `https://www.google.com/maps/search/?api=1&query=${searchKeyword}`;
            const amapUrl = `https://ditu.amap.com/search?query=${searchKeyword}`;
            content.innerHTML = `
                <div class="w-full text-left">
                    <h3 class="text-xl font-bold text-slate-800 mb-2">${act.title}</h3>
                    <p class="text-slate-600 text-sm leading-relaxed mb-6 bg-slate-50 p-4 rounded-xl border border-slate-100">${act.desc || '?�세 ?��????�습?�다.'}</p>
                    <div class="space-y-2">
                        <a href="${amapUrl}" target="_blank" class="flex items-center justify-center gap-2 w-full bg-emerald-500 hover:bg-emerald-600 text-white font-medium py-2.5 px-4 rounded-xl transition text-sm">
                            <i class="fa-solid fa-map"></i> Amap 길찾�?
                        </a>
                        <a href="${googleMapUrl}" target="_blank" class="flex items-center justify-center gap-2 w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium py-2.5 px-4 rounded-xl transition text-sm">
                            <i class="fa-solid fa-location-arrow"></i> Google 지??검??
                        </a>
                    </div>
                </div>
            `;
        }

        function getFallbackDefaultData() {
            return [
                { id: "d1", date: new Date().toISOString().slice(0,10), title: "Day 1", hotel: "", food: "", notes: "", activities: [] },
                { id: "d2", date: new Date(Date.now()+86400000).toISOString().slice(0,10), title: "Day 2", hotel: "", food: "", notes: "", activities: [] }
            ];
        }

        // ============================================================
        //  iOS HOME SCREEN TUTORIAL
        // ============================================================
        function isIOS() {
            return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        }

        function isInStandaloneMode() {
            return window.navigator.standalone === true;
        }

        function showIOSTutorial() {
            if (localStorage.getItem('tw_ios_tutorial_dismissed')) return;
            document.getElementById('ios-tutorial').classList.remove('hidden');
        }

        function dismissIOSTutorial() {
            localStorage.setItem('tw_ios_tutorial_dismissed', 'true');
            document.getElementById('ios-tutorial').classList.add('hidden');
        }

        // Detect iOS on load
        window.addEventListener('DOMContentLoaded', function() {
            if (isIOS() && !isInStandaloneMode()) {
                setTimeout(showIOSTutorial, 2000);
            }
        });

        // ============================================================
        //  ON LOAD ??determine initial view
        // ============================================================
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);

            // Clean old ?user= param silently
            if (urlParams.get('user')) {
                urlParams.delete('user');
                urlParams.delete('guest');
                const clean = urlParams.toString() ? '?' + urlParams.toString() : '';
                window.history.replaceState({}, '', window.location.pathname + clean);
            }

            // Line OAuth callback
            const lineId = urlParams.get('line_id');
            const lineError = urlParams.get('line_error');
            if (lineId || lineError) {
                if (lineId) handleLineResponse(urlParams);
                else if (lineError) showToast('Line 로그???�패');
                window.history.replaceState({}, '', window.location.pathname);
            }

            // Restore login state from localStorage
            const savedEmail = localStorage.getItem('tw_user_email');
            const savedName = localStorage.getItem('tw_user_name');
            const savedPicture = localStorage.getItem('tw_user_picture');
            const savedUid = localStorage.getItem('tw_user_uid');
            if (savedEmail && savedName && savedUid) {
                currentUser = { email: savedEmail, name: savedName, picture: savedPicture, uid: savedUid };
                isLoggedIn = true;
                updateLandingAuthUI();
            }

            if (currentUser) {
                handleStartClick();
            } else {
                showLanding();
            }
        };
    </script>
