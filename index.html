              activities: [
                  { id: "a27", time: "09:30", icon: "fa-camera", title: "三星堆博物館", desc: "看青銅神樹、黃金面具，沉睡數千年一醒驚天下" }
              ]
            },
            { id: "d13", date: "2026-07-15", title: "成都悠閒時光", hotel: "成都市區飯店", food: "伴手禮採買，最後一頓火鍋", notes: "整理行李，準備隔天回程。",
              activities: [
                  { id: "a28", time: "10:00", icon: "fa-person-walking", title: "人民公園", desc: "喝蓋碗茶、體驗成都慢生活，看相親角" },
                  { id: "a29", time: "14:00", icon: "fa-camera", title: "東郊記憶", desc: "工業風文創園區，拍美照" }
              ]
            },
            { id: "d14", date: "2026-07-16", title: "賦歸：成都飛往高雄", hotel: "溫慢的家", food: "機場簡餐、機上餐點", notes: "班機較早，請提早前往天府機場。",
              activities: [
                  { id: "a30", time: "05:00", icon: "fa-car", title: "前往天府機場 T1", desc: "成都市區至天府機場約需1-1.5小時" },
                  { id: "a31", time: "08:10", icon: "fa-plane", title: "成都起飛 (CX917)", desc: "前往香港轉機" },
                  { id: "a32", time: "16:35", icon: "fa-plane", title: "香港起飛 (CX458)", desc: "飛往高雄小港機場，18:10 抵達" }
              ]
            }
        ];

        /**
         * ==========================================
         * 2. 狀態管理與密碼驗證
         * ==========================================
         */
        let itineraryData = [];
        let currentDayIndex = 0;
        
        const ALLOWED_EMAILS = ['admin@gmail.com', 'test@gmail.com']; 
        let isLoggedIn = false;
        let isGuestMode = false;

        function initApp() {
            // 優先驗證行程代碼（如果 Session 沒有解鎖紀錄，就保持阻擋）
            if (sessionStorage.getItem('trip_unlocked') === 'true') {
                hideAuthOverlay();
            }

            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('guest') === '1') {
                isGuestMode = true;
                document.getElementById('guest-badge').classList.remove('hidden');
                document.getElementById('btn-login').classList.add('hidden');
                document.getElementById('btn-share').classList.add('hidden');
            }

            const savedData = localStorage.getItem('sichuan_itinerary');
            if (savedData) {
                itineraryData = JSON.parse(savedData);
            } else {
                itineraryData = JSON.parse(JSON.stringify(defaultItinerary));
                saveDataToStorage();
            }

            const savedUser = localStorage.getItem('itinerary_user');
            if (savedUser && !isGuestMode) {
                isLoggedIn = true;
                document.getElementById('btn-login').classList.add('hidden');
                document.getElementById('user-profile').classList.remove('hidden');
                document.getElementById('user-name').textContent = savedUser;
                document.getElementById('btn-share').classList.remove('hidden');
            }

            renderTimeline();
            selectDay(0);
        }

        // 驗證行程代碼函數
        function verifyTripCode() {
            const inputCode = document.getElementById('input-trip-code').value.trim();
            const errorElement = document.getElementById('trip-code-error');
            
            if (inputCode === TRIP_CODE) {
                sessionStorage.setItem('trip_unlocked', 'true');
                errorElement.classList.add('opacity-0');
                hideAuthOverlay();
                showToast("解鎖成功，歡迎查看行程！");
            } else {
                errorElement.classList.remove('opacity-0');
                // 震動視覺提示
                const overlayBox = document.getElementById('itinerary-auth-overlay').firstElementChild;
                overlayBox.classList.add('animate-bounce');
                setTimeout(() => overlayBox.classList.remove('animate-bounce'), 1000);
            }
        }

        function hideAuthOverlay() {
            const overlay = document.getElementById('itinerary-auth-overlay');
            overlay.classList.add('opacity-0', 'pointer-events-none', 'transition-all', 'duration-500');
            setTimeout(() => overlay.classList.add('hidden'), 500);
        }

        function saveDataToStorage() {
            localStorage.setItem('sichuan_itinerary', JSON.stringify(itineraryData));
        }

        /**
         * ==========================================
         * 3. 權限與登入邏輯
         * ==========================================
         */
        function handleLogin() {
            const email = prompt("請輸入您的編輯權限登入 Email：\n(測試白名單可輸入: test@gmail.com)");
            if (!email) return;

            if (ALLOWED_EMAILS.includes(email.trim().toLowerCase())) {
                isLoggedIn = true;
                localStorage.setItem('itinerary_user', email);
                document.getElementById('btn-login').classList.add('hidden');
                document.getElementById('user-profile').classList.remove('hidden');
                document.getElementById('user-name').textContent = email;
                document.getElementById('btn-share').classList.remove('hidden');
                applyPermissions();
                showToast("登入成功！已開啟編輯權限");
            } else {
                showToast("登入失敗：此帳號不在權限白名單內");
            }
        }

        function handleLogout() {
            isLoggedIn = false;
            localStorage.removeItem('itinerary_user');
            document.getElementById('btn-login').classList.remove('hidden');
            document.getElementById('user-profile').classList.add('hidden');
            applyPermissions();
            showToast("已成功登出");
        }

        function applyPermissions() {
            const editElements = document.querySelectorAll('.edit-only');
            editElements.forEach(el => {
                if (isLoggedIn && !isGuestMode) {
                    el.classList.remove('hidden');
                } else {
                    el.classList.add('hidden');
                }
            });
        }

        function shareItinerary() {
            const shareUrl = `${window.location.origin}${window.location.pathname}?guest=1`;
            navigator.clipboard.writeText(shareUrl).then(() => {
                showToast("已複製訪客唯讀分享連結到剪貼簿！");
            }).catch(() => {
                showToast("複製失敗，請手動加上 ?guest=1 分享");
            });
        }

        /**
         * ==========================================
         * 4. UI 渲染邏輯
         * ==========================================
         */
        function renderTimeline() {
            const container = document.getElementById('timeline-container');
            container.innerHTML = '';
            
            itineraryData.forEach((day, index) => {
                const dateObj = new Date(day.date);
                const dayOfWeek = ['日', '一', '二', '三', '四', '五', '六'][dateObj.getDay()];
                const shortDate = `${dateObj.getMonth() + 1}/${dateObj.getDate()}`;
                
                const btn = document.createElement('button');
                btn.className = `w-full text-left p-3 md:p-4 rounded-xl transition-all duration-200 border-2 mb-2 flex items-center gap-3 ${
                    index === currentDayIndex 
                    ? 'bg-sky-50 border-primary text-primary shadow-sm scale-100' 
                    : 'bg-white border-transparent text-slate-600 hover:bg-slate-50 scale-95 md:scale-100'
                }`;
                btn.onclick = () => selectDay(index);
                
                btn.innerHTML = `
                    <div class="bg-white/80 shrink-0 w-12 h-12 rounded-lg flex flex-col items-center justify-center border border-slate-100 shadow-sm">
                        <span class="text-xs font-bold text-slate-400">Day ${index + 1}</span>
                        <span class="text-sm font-black">${shortDate}</span>
                    </div>
                    <div class="hidden md:block overflow-hidden">
                        <div class="text-xs font-bold uppercase tracking-wider mb-0.5 opacity-80">星期${dayOfWeek}</div>
                        <div class="font-bold truncate text-sm">${day.title}</div>
                    </div>
                `;
                container.appendChild(btn);
            });
        }

        function selectDay(index) {
            currentDayIndex = index;
            renderTimeline();
            
            const day = itineraryData[index];
            document.getElementById('current-day-title').textContent = `Day ${index + 1}: ${day.title}`;
            
            const dateObj = new Date(day.date);
            const dayOfWeek = ['日', '一', '二', '三', '四', '五', '六'][dateObj.getDay()];
            document.getElementById('current-day-date').textContent = `${day.date} (星期${dayOfWeek})`;

            document.getElementById('info-hotel').textContent = day.hotel || '無安排';
            document.getElementById('info-food').textContent = day.food || '無特別安排';
            document.getElementById('info-notes').textContent = day.notes || '尚無備忘錄資訊...';

            renderActivities(day.activities);
            
            document.getElementById('map-panel').classList.remove('lg:flex');
            document.getElementById('map-panel').classList.add('hidden');
        }

        function renderActivities(activities) {
            const container = document.getElementById('activities-container');
            container.innerHTML = '';
            
            if(!activities || activities.length === 0) {
                container.innerHTML = `<div class="text-slate-400 text-center py-8">尚無景點行程，請點擊新增。</div>`;
                return;
            }

            activities.forEach((act, idx) => {
                const actDiv = document.createElement('div');
                actDiv.className = "relative flex items-start gap-4 md:gap-6 group cursor-pointer";
                actDiv.onclick = (e) => {
                    if(e.target.closest('button')) return;
                    showMapPreview(act);
                };

                actDiv.innerHTML = `
                    <div class="w-12 md:w-20 pt-1 text-right shrink-0">
                        <span class="text-sm font-black text-slate-700">${act.time}</span>
                    </div>
                    <div class="relative z-10 w-10 h-10 rounded-full bg-white border-4 border-slate-100 shadow-sm flex items-center justify-center text-primary shrink-0 transition-transform group-hover:scale-110 group-hover:border-blue-100 group-hover:text-sky-600">
                        <i class="fa-solid ${act.icon}"></i>
                    </div>
                    <div class="flex-1 bg-white p-4 md:p-5 rounded-2xl shadow-sm border border-slate-100 transition-all hover:shadow-md">
                        <div class="flex justify-between items-start">
                            <h4 class="font-bold text-lg text-slate-800 mb-1">${act.title}</h4>
                            <div class="edit-only hidden flex gap-2">
                                <button onclick="editActivity(${idx})" class="text-slate-400 hover:text-primary"><i class="fa-solid fa-pen-to-square"></i></button>
                                <button onclick="deleteActivity(${idx})" class="text-slate-400 hover:text-red-500"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        </div>
                        <p class="text-slate-600 text-sm leading-relaxed">${act.desc}</p>
                    </div>
                `;
                container.appendChild(actDiv);
            });
            
            applyPermissions();
        }

        /**
         * ==========================================
         * 5. 編輯與表單邏輯
         * ==========================================
         */
        let editingActIndex = -1;

        function openDayInfoModal() {
            if(!isLoggedIn) return showToast("請先登入");
            const day = itineraryData[currentDayIndex];
            document.getElementById('input-hotel').value = day.hotel || '';
            document.getElementById('input-food').value = day.food || '';
            document.getElementById('input-notes').value = day.notes || '';
            document.getElementById('modal-day-info').classList.remove('hidden');
        }

        function saveDayInfo() {
            const day = itineraryData[currentDayIndex];
            day.hotel = document.getElementById('input-hotel').value;
            day.food = document.getElementById('input-food').value;
            day.notes = document.getElementById('input-notes').value;
            
            saveDataToStorage();
            selectDay(currentDayIndex);
            closeModal('modal-day-info');
            showToast("資訊已儲存");
        }

        function openActivityModal(isEdit = false, idx = -1) {
            if(!isLoggedIn) return showToast("請先登入");
            editingActIndex = idx;
            document.getElementById('modal-activity-title').textContent = isEdit ? '編輯景點' : '新增景點';
            
            if (isEdit && idx >= 0) {
                const act = itineraryData[currentDayIndex].activities[idx];
                document.getElementById('act-time').value = act.time;
                document.getElementById('act-icon').value = act.icon;
                document.getElementById('act-title').value = act.title;
                document.getElementById('act-desc').value = act.desc;
            } else {
                document.getElementById('act-time').value = '09:00';
                document.getElementById('act-icon').value = 'fa-location-dot';
                document.getElementById('act-title').value = '';
                document.getElementById('act-desc').value = '';
            }
            document.getElementById('modal-activity').classList.remove('hidden');
        }

        function editActivity(idx) { openActivityModal(true, idx); }

        function deleteActivity(idx) {
            if(!isLoggedIn) return;
            if(confirm('確定要刪除這個行程嗎？')) {
                itineraryData[currentDayIndex].activities.splice(idx, 1);
                saveDataToStorage();
                renderActivities(itineraryData[currentDayIndex].activities);
                showToast("已刪除");
            }
        }

        function saveActivity() {
            const time = document.getElementById('act-time').value;
            const icon = document.getElementById('act-icon').value;
            const title = document.getElementById('act-title').value.trim();
            const desc = document.getElementById('act-desc').value.trim();
            
            if(!title) return showToast("標題不能為空");

            const newAct = {
                id: Date.now().toString(),
                time, icon, title, desc
            };

            if (!itineraryData[currentDayIndex].activities) {
                itineraryData[currentDayIndex].activities = [];
            }

            if (editingActIndex >= 0) {
                itineraryData[currentDayIndex].activities[editingActIndex] = newAct;
            } else {
                itineraryData[currentDayIndex].activities.push(newAct);
            }
            
            itineraryData[currentDayIndex].activities.sort((a, b) => a.time.localeCompare(b.time));

            saveDataToStorage();
            renderActivities(itineraryData[currentDayIndex].activities);
            closeModal('modal-activity');
            showToast("行程已儲存");
        }

        function closeModal(id) {
            document.getElementById(id).classList.add('hidden');
        }

        /**
         * ==========================================
         * 6. 地圖與右側面板預覽
         * ==========================================
         */
        function showMapPreview(act) {
            const panel = document.getElementById('map-panel');
            const content = document.getElementById('preview-content');
            
            panel.classList.remove('hidden');
            panel.classList.add('flex');
            
            if(window.innerWidth < 1024) {
                panel.classList.add('fixed', 'inset-y-0', 'right-0', 'z-40', 'shadow-2xl');
            }

            const searchKeyword = encodeURIComponent(act.title);
            const googleMapUrl = `https://www.google.com/maps/search/?api=1&query=${searchKeyword}`;
            const amapUrl = `https://ditu.amap.com/search?query=${searchKeyword}`;

            content.innerHTML = `
                <div class="w-full text-left">
                    <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-blue-50 text-primary mb-4">
                        <i class="fa-solid ${act.icon} text-xl"></i>
                    </div>
                    <h3 class="text-xl font-bold text-slate-800 mb-2">${act.title}</h3>
                    <p class="text-slate-600 text-sm leading-relaxed mb-6 bg-slate-50 p-4 rounded-xl border border-slate-100">${act.desc || '暫無詳細說明。'}</p>
                    
                    <div class="space-y-2 mt-4">
                        <a href="${amapUrl}" target="_blank" class="flex items-center justify-center gap-2 w-full bg-emerald-500 hover:bg-emerald-600 text-white font-medium py-2.5 px-4 rounded-xl transition text-sm shadow-sm">
                            <i class="fa-solid fa-map"></i> 使用高德地圖導航 (大陸推薦)
                        </a>
                        <a href="${googleMapUrl}" target="_blank" class="flex items-center justify-center gap-2 w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium py-2.5 px-4 rounded-xl transition text-sm">
                            <i class="fa-solid fa-location-arrow"></i> 使用 Google Maps 搜尋
                        </a>
                    </div>
                </div>
            `;
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.remove('opacity-0', 'translate-y-10', 'pointer-events-none');
            toast.classList.add('opacity-100', 'translate-y-0');
            
            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'translate-y-10', 'pointer-events-none');
            }, 3000);
        }
    </script>
</body>
</html>
