<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travelweb | 出遊網頁規劃</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        #modal-day-info input, #modal-day-info textarea, #modal-activity input, #modal-activity textarea, #modal-global-config input { background-color: #ffffff !important; color: #1e293b !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col font-sans" onload="initApp()">

    <!-- 頂部導航 -->
    <header class="bg-white shadow-sm px-6 py-4 flex justify-between items-center z-20">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-mountain-sun text-sky-600 text-2xl"></i>
            <span class="text-xl font-bold text-slate-900">Travelweb</span>
        </div>
        <div id="auth-section">
            <!-- 登入按鈕 -->
            <div id="g_id_onload" data-client_id="1006606665070-26sq5tv532t84jqa2onivk26fbisnhl4.apps.googleusercontent.com" data-callback="handleGoogleSignInResponse" data-itp_support="true"></div>
            <div class="g_id_signin" data-type="standard" data-size="medium"></div>
        </div>
    </header>

    <!-- 應用程式說明區塊 (讓 Google 審查員能直接看到用途) -->
    <main id="landing-hero" class="flex-1 flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-4xl font-bold text-slate-900 mb-6">Travelweb | 出遊網頁規劃</h1>
        <p class="max-w-xl text-lg text-slate-600 mb-8">
            Travelweb 是一款專業的數位旅遊行程管理工具。我們提供結構化的行程安排、景點地圖預覽、以及團隊/家庭成員間的即時同步功能，協助您輕鬆規劃每一場完美的旅程。
        </p>
        <button onclick="document.getElementById('itinerary-auth-overlay').classList.remove('hidden')" class="bg-sky-600 hover:bg-sky-700 text-white px-8 py-3 rounded-full font-bold shadow-lg transition">
            開始使用行程規劃功能
        </button>
    </main>

    <!-- 行程代碼驗證遮罩 (改為點擊後觸發) -->
    <div id="itinerary-auth-overlay" class="fixed inset-0 bg-slate-900/90 flex items-center justify-center z-50 p-4 hidden">
        <div class="bg-white rounded-2xl w-full max-w-md p-8 shadow-2xl text-center">
            <h2 class="text-xl font-bold mb-4">請輸入行程代碼</h2>
            <input type="password" id="input-trip-code" placeholder="輸入代碼解鎖" class="w-full border p-3 rounded-lg mb-4 text-center">
            <button onclick="verifyTripCode()" class="w-full bg-sky-600 text-white py-3 rounded-lg font-bold">確認進入</button>
        </div>
    </div>

    <!-- 頁尾隱私連結 -->
    <footer class="p-6 text-center text-sm text-slate-400">
        <a href="privacy.html" class="hover:text-sky-600">隱私權政策 (Privacy Policy)</a>
    </footer>

    <script>
        const GAS_API_URL = "請填入您的 GAS 網址"; // 務必填寫
        function initApp() { /* 初始化邏輯 */ }
        function verifyTripCode() { /* 驗證邏輯 */ }
        function handleGoogleSignInResponse(response) { /* 登入邏輯 */ }
        function verifyTripCode() {
            const input = document.getElementById('input-trip-code').value;
            if(input === "你的密碼") {
                sessionStorage.setItem('trip_unlocked', 'true');
                window.location.href = "dashboard.html"; // 建議將行程本體移至新頁面或隱藏區塊
            } else {
                alert("代碼錯誤");
            }
        }
    </script>
</body>
</html>
