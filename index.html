    <script>
        // 🔗 請將此換成你重新部署好的 Google Apps Script 網頁應用程式網址
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbwj5ySfliPEHveD_9QpzkRwDGmWXjrREUbZz58rGwMyAMwZOo0XbyR2zPt12FeranlaLQ/exec";

        // 🛡️ 後端同步白名單（會自動從 GAS 下載回來更新）
        let allowedEmails = []; 

        let globalConfig = {
            tripCode: "九寨溝2026",
            tripTitle: "帶爸媽去九寨溝 14天之旅",
            tripDate: "2026.07.03 - 2026.07.16"
        };
        let itineraryData = [];
        let currentDayIndex = 0;
        
        let isLoggedIn = false;
        let isGuestMode = false;

        function decodeJwt(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                return JSON.parse(jsonPayload);
            } catch (e) {
                return null;
            }
        }

        // 核心：當使用者透過 Google 登入成功
        function handleGoogleSignInResponse(response) {
            const payload = decodeJwt(response.credential);
            if (!payload) return showToast("無法讀取 Google 登入資訊");

            const email = payload.email.trim().toLowerCase();
            
            // 🔍 比對從後端 GAS 傳過來的白名單陣列
            if (allowedEmails.includes(email) && !isGuestMode) {
                isLoggedIn = true;
                localStorage.setItem('itinerary_user_email', email);
                localStorage.setItem('user_profile_name', payload.name);
                localStorage.setItem('user_profile_picture', payload.picture);
                
                showUserProfileUI(payload.name, payload.picture);
                applyPermissions();
                showToast(`歡迎回來，${payload.name}！已開通編輯權限。`);
            } else {
                showToast("登入成功！但你的帳號不在雲端試算表白名單中，改以唯讀模式瀏覽。");
            }
        }

        function showUserProfileUI(name, picture) {
            document.getElementById('g-signin-btn-wrapper').classList.add('hidden');
            const profile = document.getElementById('user-profile');
            profile.classList.remove('hidden');
            document.getElementById('user-avatar').src = picture;
            document.getElementById('user-name').textContent = name;
        }

        function handleLogout() {
            isLoggedIn = false;
            localStorage.removeItem('itinerary_user_email');
            localStorage.removeItem('user_profile_name');
            localStorage.removeItem('user_profile_picture');
            
            google.accounts.id.disableAutoSelect();
            showToast("已成功登出管理權限");
            setTimeout(() => window.location.reload(), 800);
        }

        async function fetchFromCloud(action, data = null) {
            if (!GAS_API_URL || GAS_API_URL.includes("請將你部署好的")) {
                console.warn("GAS_API_URL 未正確設定，切換為本地模擬模式。");
                return null;
            }
            try {
                const response = await fetch(GAS_API_URL, {
                    method: "POST",
                    mode: "cors",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify({ action, data })
                });
                return await response.json();
            } catch (err) {
                console.error("雲端連線失敗:", err);
                return null;
            }
        }

        async function initApp() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('guest') === '1') {
                isGuestMode = true;
                document.getElementById('guest-badge').classList.remove('hidden');
                document.getElementById('g-signin-btn-wrapper').classList.add('hidden');
            }

            // 📥 從雲端把設定、行程跟「白名單」一起拉下來
            const cloudConfig = await fetchFromCloud("get");
            if (cloudConfig) {
                globalConfig.tripCode = cloudConfig.tripCode || globalConfig.tripCode;
                globalConfig.tripTitle = cloudConfig.tripTitle || globalConfig.tripTitle;
                globalConfig.tripDate = cloudConfig.tripDate || globalConfig.tripDate;
                
                if (cloudConfig.allowedEmails) {
                    allowedEmails = cloudConfig.allowedEmails; // 同步雲端白名單
                }
                
                if (cloudConfig.itineraryData && cloudConfig.itineraryData.length > 0) {
                    itineraryData = cloudConfig.itineraryData;
                }
            }

            if (itineraryData.length === 0) {
                itineraryData = getFallbackDefaultData();
                await syncToCloud();
            }

            document.getElementById('loading-overlay').classList.add('opacity-0', 'pointer-events-none');
            updateHeaderUI();

            if (sessionStorage.getItem('trip_unlocked') === 'true') {
                hideAuthOverlay();
            } else {
                document.getElementById('itinerary-auth-overlay').classList.remove('hidden');
            }

            // 檢查本地登入記憶狀態
            const savedEmail = localStorage.getItem('itinerary_user_email');
            if (savedEmail && allowedEmails.includes(savedEmail) && !isGuestMode) {
                isLoggedIn = true;
                showUserProfileUI(
                    localStorage.getItem('user_profile_name') || savedEmail,
                    localStorage.getItem('user_profile_picture') || ""
                );
            }

            renderTimeline();
            selectDay(0);
            applyPermissions();
        }

        function updateHeaderUI() {
            document.getElementById('web-title').textContent = globalConfig.tripTitle;
            document.getElementById('main-trip-title').textContent = globalConfig.tripTitle;
            document.getElementById('main-trip-date').textContent = globalConfig.tripDate;
        }

        async function syncToCloud() {
            showToast("正在同步最新行程至雲端...");
            const result = await fetchFromCloud("save", {
                tripCode: globalConfig.tripCode,
                tripTitle: globalConfig.tripTitle,
                tripDate: globalConfig.tripDate,
                itineraryData: itineraryData
            });
            if (result && result.status === "success") {
                showToast("雲端行程同步完成！");
            } else {
                showToast("同步失敗，已暫存於本地。");
            }
        }

        function verifyTripCode() {
            const inputCode = document.getElementById('input-trip-code').value.trim();
            const errorElement = document.getElementById('trip-code-error');
            
            if (inputCode === globalConfig.tripCode) {
                sessionStorage.setItem('trip_unlocked', 'true');
                errorElement.classList.add('opacity-0');
                hideAuthOverlay();
                showToast("解鎖成功，歡迎查看行程！");
            } else {
                errorElement.classList.remove('opacity-0');
                const overlayBox = document.getElementById('itinerary-auth-overlay').firstElementChild;
                overlayBox.classList.add('animate-bounce');
                setTimeout(() => overlayBox.classList.remove('animate-bounce'), 1000);
            }
        }

        function hideAuthOverlay() {
            const overlay = document.getElementById('itinerary-auth-overlay');
            overlay.classList.add('opacity-0', 'pointer-events-none', 'transition-all', 'duration-500');
            setTimeout(() => overlay.classList.add('hidden'), 500);
        }

        function openGlobalConfigModal() {
            if(!isLoggedIn) return;
            document.getElementById('config-trip-code').value = globalConfig.tripCode;
            document.getElementById('config-trip-title').value = globalConfig.tripTitle;
            document.getElementById('config-trip-date').value = globalConfig.tripDate;
            document.getElementById('modal-global-config').classList.remove('hidden');
        }

        async function saveGlobalConfig() {
            const newCode = document.getElementById('config-trip-code').value.trim();
            const newTitle = document.getElementById('config-trip-title').value.trim();
            const newDate = document.getElementById('config-trip-date').value.trim();

            if(!newCode || !newTitle) return showToast("代碼與標題不能為空！");

            globalConfig.tripCode = newCode;
            globalConfig.tripTitle = newTitle;
            globalConfig.tripDate = newDate;

            updateHeaderUI();
            closeModal('modal-global-config');
            await syncToCloud();
        }

        function shareItinerary() {
            const shareUrl = `${window.location.origin}${window.location.pathname}?guest=1`;
            navigator.clipboard.writeText(shareUrl).then(() => {
                showToast("已複製訪客分享網址！");
            }).catch(() => {
                prompt("請手動複製以下網址分享：", shareUrl);
            });
        }

        function applyPermissions() {
            const editElements = document.querySelectorAll('.edit-only');
            editElements.forEach(el => {
                if (isLoggedIn && !isGuestMode) el.classList.remove('hidden');
                else el.classList.add('hidden');
            });
            
            if(isLoggedIn && !isGuestMode) {
                document.getElementById('btn-global-config').classList.remove('hidden');
                document.getElementById('btn-share').classList.remove('hidden');
            } else {
                document.getElementById('btn-global-config').classList.add('hidden');
            }
        }

        function renderTimeline() {
            const container = document.getElementById('timeline-container');
            container.innerHTML = '';
            
            itineraryData.forEach((day, index) => {
                const dateObj = new Date(day.date);
                const dayOfWeek = ['日', '一', '二', '三', '四', '五', '六'][dateObj.getDay()];
                const shortDate = `${dateObj.getMonth() + 1}/${dateObj.getDate()}`;
                
                const btn = document.createElement('button');
                btn.className = `w-full text-left p-3 md:p-4 rounded-xl transition-all duration-200 border-2 mb-2 flex items-center gap-3 ${
                    index === currentDayIndex 
                    ? 'bg-sky-50 border-primary text-primary shadow-sm' 
                    : 'bg-white border-transparent text-slate-600 hover:bg-slate-50'
                }`;
                btn.onclick = () => selectDay(index);
                
                btn.innerHTML = `
                    <div class="bg-white/80 shrink-0 w-12 h-12 rounded-lg flex flex-col items-center justify-center border border-slate-100 shadow-sm">
                        <span class="text-xs font-bold text-slate-400">Day ${index + 1}</span>
                        <span class="text-sm font-black">${shortDate}</span>
                    </div>
                    <div class="hidden md:block overflow-hidden">
                        <div class="text-xs font-bold uppercase tracking-wider mb-0.5 opacity-80">星期${dayOfWeek}</div>
                        <div class="font-bold truncate text-sm">${day.title}</div>
                    </div>
                `;
                container.appendChild(btn);
            });
        }

        function selectDay(index) {
            currentDayIndex = index;
            renderTimeline();
            
            const day = itineraryData[index];
            document.getElementById('current-day-title').textContent = `Day ${index + 1}: ${day.title}`;
            
            const dateObj = new Date(day.date);
            const dayOfWeek = ['日', '一', '二', '三', '四', '五', '六'][dateObj.getDay()];
            document.getElementById('current-day-date').textContent = `${day.date} (星期${dayOfWeek})`;

            document.getElementById('info-hotel').textContent = day.hotel || '無安排';
            document.getElementById('info-food').textContent = day.food || '無特別安排';
            document.getElementById('info-notes').textContent = day.notes || '尚無備忘錄資訊...';

            renderActivities(day.activities);
        }

        function renderActivities(activities) {
            const container = document.getElementById('activities-container');
            container.innerHTML = '';
            
            if(!activities || activities.length === 0) {
                container.innerHTML = `<div class="text-slate-400 text-center py-8">尚無景點行程，請點擊新增。</div>`;
                return;
            }

            activities.forEach((act, idx) => {
                const actDiv = document.createElement('div');
                actDiv.className = "relative flex items-start gap-4 md:gap-6 group cursor-pointer";
                actDiv.onclick = (e) => {
                    if(e.target.closest('button')) return;
                    showMapPreview(act);
                };

                actDiv.innerHTML = `
                    <div class="w-12 md:w-20 pt-1 text-right shrink-0">
                        <span class="text-sm font-black text-slate-700">${act.time}</span>
                    </div>
                    <div class="relative z-10 w-10 h-10 rounded-full bg-white border-4 border-slate-100 shadow-sm flex items-center justify-center text-primary shrink-0 transition-transform group-hover:scale-110">
                        <i class="fa-solid ${act.icon}"></i>
                    </div>
                    <div class="flex-1 bg-white p-4 md:p-5 rounded-2xl shadow-sm border border-slate-100">
                        <div class="flex justify-between items-start">
                            <h4 class="font-bold text-lg text-slate-800 mb-1">${act.title}</h4>
                            <div class="edit-only hidden flex gap-2">
                                <button onclick="editActivity(${idx})" class="text-slate-400 hover:text-primary"><i class="fa-solid fa-pen-to-square"></i></button>
                                <button onclick="deleteActivity(${idx})" class="text-slate-400 hover:text-red-500"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        </div>
                        <p class="text-slate-600 text-sm leading-relaxed">${act.desc}</p>
                    </div>
                `;
                container.appendChild(actDiv);
            });
            applyPermissions();
        }

        let editingActIndex = -1;

        function openDayInfoModal() {
            if(!isLoggedIn) return showToast("請先登入");
            const day = itineraryData[currentDayIndex];
            document.getElementById('input-hotel').value = day.hotel || '';
            document.getElementById('input-food').value = day.food || '';
            document.getElementById('input-notes').value = day.notes || '';
            document.getElementById('modal-day-info').classList.remove('hidden');
        }

        async function saveDayInfo() {
            const day = itineraryData[currentDayIndex];
            day.hotel = document.getElementById('input-hotel').value;
            day.food = document.getElementById('input-food').value;
            day.notes = document.getElementById('input-notes').value;
            
            selectDay(currentDayIndex);
            closeModal('modal-day-info');
            await syncToCloud();
        }

        function openActivityModal(isEdit = false, idx = -1) {
            if(!isLoggedIn) return showToast("請先登入");
            editingActIndex = idx;
            document.getElementById('modal-activity-title').textContent = isEdit ? '編輯景點' : '新增景點';
            
            if (isEdit && idx >= 0) {
                const act = itineraryData[currentDayIndex].activities[idx];
                document.getElementById('act-time').value = act.time;
                document.getElementById('act-icon').value = act.icon;
                document.getElementById('act-title').value = act.title;
                document.getElementById('act-desc').value = act.desc;
            } else {
                document.getElementById('act-time').value = '09:00';
                document.getElementById('act-icon').value = 'fa-location-dot';
                document.getElementById('act-title').value = '';
                document.getElementById('act-desc').value = '';
            }
            document.getElementById('modal-activity').classList.remove('hidden');
        }

        function editActivity(idx) { openActivityModal(true, idx); }

        async function deleteActivity(idx) {
            if(!isLoggedIn) return;
            if(confirm('確定要刪除這個行程嗎？')) {
                itineraryData[currentDayIndex].activities.splice(idx, 1);
                renderActivities(itineraryData[currentDayIndex].activities);
                await syncToCloud();
            }
        }

        async function saveActivity() {
            const time = document.getElementById('act-time').value;
            const icon = document.getElementById('act-icon').value;
            const title = document.getElementById('act-title').value.trim();
            const desc = document.getElementById('act-desc').value.trim();
            
            if(!title) return showToast("標題不能為空");
            const newAct = { id: Date.now().toString(), time, icon, title, desc };

            if (!itineraryData[currentDayIndex].activities) itineraryData[currentDayIndex].activities = [];
            if (editingActIndex >= 0) itineraryData[currentDayIndex].activities[editingActIndex] = newAct;
            else itineraryData[currentDayIndex].activities.push(newAct);
            
            itineraryData[currentDayIndex].activities.sort((a, b) => a.time.localeCompare(b.time));
            renderActivities(itineraryData[currentDayIndex].activities);
            closeModal('modal-activity');
            await syncToCloud();
        }

        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        function showMapPreview(act) {
            const panel = document.getElementById('map-panel');
            const content = document.getElementById('preview-content');
            panel.classList.remove('hidden');
            panel.classList.add('flex');
            
            const searchKeyword = encodeURIComponent(act.title);
            const googleMapUrl = `https://www.google.com/maps/search/?api=1&query=${searchKeyword}`;
            const amapUrl = `https://ditu.amap.com/search?query=${searchKeyword}`;

            content.innerHTML = `
                <div class="w-full text-left">
                    <h3 class="text-xl font-bold text-slate-800 mb-2">${act.title}</h3>
                    <p class="text-slate-600 text-sm leading-relaxed mb-6 bg-slate-50 p-4 rounded-xl border border-slate-100">${act.desc || '暫無詳細說明。'}</p>
                    <div class="space-y-2">
                        <a href="${amapUrl}" target="_blank" class="flex items-center justify-center gap-2 w-full bg-emerald-500 hover:bg-emerald-600 text-white font-medium py-2.5 px-4 rounded-xl transition text-sm">
                            <i class="fa-solid fa-map"></i> 高德地圖導航
                        </a>
                        <a href="${googleMapUrl}" target="_blank" class="flex items-center justify-center gap-2 w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium py-2.5 px-4 rounded-xl transition text-sm">
                            <i class="fa-solid fa-location-arrow"></i> Google 地圖搜尋
                        </a>
                    </div>
                </div>
            `;
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.remove('opacity-0', 'translate-y-10', 'pointer-events-none');
            toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'translate-y-10', 'pointer-events-none');
            }, 3000);
        }

        function getFallbackDefaultData() {
            return [
                { id: "d1", date: "2026-07-03", title: "啟程：高雄飛往成都", hotel: "成都市區精選飯店", food: "機上餐點 / 飯店宵夜", notes: "首日抵達時間較晚，專車接送至飯店後請盡早休息。", activities: [{ id: "d1_a1", time: "13:40", icon: "fa-plane", title: "高雄小港機場 T1 起飛", desc: "搭乘航班前往香港轉機。" }] }
            ];
        }
    </script>
</body>
</html>
