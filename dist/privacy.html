<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>隱私權政策 - Travelweb</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
    <div class="max-w-3xl mx-auto px-6 py-12 bg-white shadow-sm my-8 rounded-xl border border-slate-200">
        <div id="privacy-content">
            <div class="text-center py-8 text-slate-400">載入中...</div>
        </div>
        <div class="mt-8 pt-6 border-t text-center">
            <a href="/" class="text-primary hover:underline text-sm">← 返回首頁</a>
        </div>
    </div>
    <script>
        const API_BASE = "https://travel-api.pengjun0429.workers.dev";
        fetch(`${API_BASE}/api/privacy`)
            .then(r => r.json())
            .then(data => {
                if (data.content) {
                    document.getElementById('privacy-content').innerHTML = data.content;
                } else {
                    document.getElementById('privacy-content').innerHTML = '<h1 class="text-2xl font-bold">隱私權政策</h1><p class="text-slate-500 mt-4">暫無內容。</p>';
                }
            })
            .catch(() => {
                document.getElementById('privacy-content').innerHTML = '<h1 class="text-2xl font-bold">隱私權政策</h1><p class="text-slate-500 mt-4">載入失敗。</p>';
            });
    </script>
</body>
</html>
